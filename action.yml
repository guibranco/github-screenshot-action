name: "GitHub Screenshot Action"
description: "Capture, monitor, and version website screenshots from a JSON list"

inputs:
  json_file:
    description: "Path to JSON file with URLs"
    required: true

  output_dir:
    description: "Directory to save screenshots"
    required: true

  create_pr:
    description: "Create PR instead of direct commit"
    required: false
    default: "false"

  branch_name:
    description: "Branch name if PR is enabled"
    required: false
    default: "screenshots/update"

  concurrency:
    description: "Number of parallel screenshots"
    required: false
    default: "3"

  timeout_ms:
    description: "Page load timeout in milliseconds"
    required: false
    default: "30000"

  retries:
    description: "Number of retries per URL"
    required: false
    default: "2"

  wait_until:
    description: "Puppeteer page load event to wait for before capturing. Options: load, domcontentloaded, networkidle0, networkidle2"
    required: false
    default: "networkidle2"

  wait_after_load:
    description: "Extra milliseconds to wait after the page load event. Useful for React/Vite apps that animate or fetch data lazily after hydration."
    required: false
    default: "0"
  
  square:
    description: "If true, captures a square screenshot by setting a square viewport and clipping to width x width"
    required: false
    default: "false"
  
  viewport_width:
    description: "Viewport width in pixels. Also used as the square size when square is true."
    required: false
    default: "1280"

runs:
  using: "docker"
  image: docker://ghcr.io/guibranco/github-screenshot-action:v2.1.1

branding:
  icon: "camera"
  color: "green"
