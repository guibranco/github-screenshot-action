version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 10
    groups:
      puppeteer:
        patterns:
          - "puppeteer*"
      actions-toolkit:
        patterns:
          - "@actions/*"
      typescript:
        patterns:
          - "typescript"
          - "ts-node"
          - "@types/*"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(npm)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 10
    groups:
      actions-core:
        patterns:
          - "actions/*"
      docker-actions:
        patterns:
          - "docker/*"
      gittools:
        patterns:
          - "gittools/*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
