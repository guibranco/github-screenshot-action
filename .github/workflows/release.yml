name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.1
        with:
          versionSpec: "6.x"

      - name: 🏷️ Determine Version Number
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.1

      - name: Set version env
        run: |
          echo "VERSION=${{ steps.gitversion.outputs.semVer }}" >> $GITHUB_ENV

      - name: Build project
        run: |
          npm ci
          npm run build

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${VERSION}
          git push origin v${VERSION}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: |
            Automated release for version ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
